name: CI / Deploy to Vercel

on:
  push:
    branches:
      - main   # change to your production branch if different

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # change if you need a different version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build   # change if your build script is different

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}       # optional
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # optional
        run: |
          # install vercel cli (npx works without global install)
          npx vercel --prod --token $VERCEL_TOKEN --yes
# ok